services:
  web:
    build: .
    ports:
      - "8000:8000"
    # 将根目录 .env 注入容器（含 PDF_FONT_PATH、限流等可选变量）
    env_file:
      - .env
    environment:
      # Compose 从「当前目录 .env」或 shell 做变量替换；未设置时构建会失败并提示
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?请在项目根目录复制 .env.example 为 .env 并填写 DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    restart: unless-stopped
